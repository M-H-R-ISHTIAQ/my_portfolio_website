<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask AI - Under Construction</title>

    <link rel="icon" type="image/png" href="nav-profile.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #081621;            
            --accent: #38bdf8;        
            --text: #f1f5f9;          
            --text-muted: #94a3b8;    
            --card-bg: #111d2a;       
            --footer-bg: #07121c;     
            --ai-purple: #a855f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- FIXED NAVIGATION BAR --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(8, 22, 33, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .back-home-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s ease;
        }

        .back-home-btn:hover { 
            color: var(--accent); 
        }

        .nav-home-pic {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        /* --- PLACEHOLDER HERO AREA --- */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, #111d2a 0%, #081621 100%);
        }

        .icon-container {
            position: relative;
            margin-bottom: 30px;
        }

        /* Pulsing AI Magic Icon */
        .icon-container i {
            font-size: 4rem;
            color: var(--ai-purple);
            animation: float 3s ease-in-out infinite;
        }

        .icon-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(168, 85, 247, 0.15);
            border-radius: 50%;
            filter: blur(10px);
            animation: pulse 2s infinite ease-in-out;
            z-index: -1;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        h1 span {
            color: var(--ai-purple);
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Technical Progress Bar Indicator */
        .progress-box {
            width: 250px;
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .progress-bar {
            width: 65%;
            height: 100%;
            background: linear-gradient(90deg, var(--ai-purple), var(--accent));
            border-radius: 10px;
            animation: process 2.5s infinite ease-in-out;
        }

        .return-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text);
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 50px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .return-btn:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.05);
            transform: translateY(-2px);
        }

        /* --- ANIMATIONS --- */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        @keyframes process {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-home-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        <img src="nav-profile.png" alt="Ishtiaq" class="nav-home-pic">
    </nav>

    <div class="container">
        <div class="icon-container">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
        </div>
        
        <h1>AI Clone <span>Under Construction</span></h1>
        
        <p>I am actively upgrading the pipeline logic and integrating the custom system instruction datasets securely. My AI persona clone will be deployed here soon!</p>
        
        <div class="progress-box">
            <div class="progress-bar"></div>
        </div>

        <a href="index.html" class="return-btn">
            <i class="fa-solid fa-house"></i> Go Back Home
        </a>
    </div>

</body>
</html>
