    <style>
        :root {
            --bg: #081621;            
            --accent: #38bdf8;        
            --text: #f1f5f9;          
            --text-muted: #94a3b8;    
            --card-bg: #111d2a;       
            --footer-bg: #07121c;     
            --st-orange: #ef4444;     
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; }
        
        nav { position: fixed; top: 0; width: 100%; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(8, 22, 33, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .nav-home-pic { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; cursor: pointer; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 6px; background: none; border: none; padding: 5px; }
        .line { width: 26px; height: 3px; background-color: var(--accent); border-radius: 2px; }
        
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 10, 15, 0.5); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 1001; }
        .menu-overlay.active { opacity: 1; pointer-events: auto; }
        .side-menu { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: #0b141d; box-shadow: -10px 0 30px rgba(0, 0, 0, 0.4); display: flex; flex-direction: column; padding: 30px 24px; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1002; border-left: 1px solid rgba(255, 255, 255, 0.05); }
        .side-menu.active { right: 0; }
        .drawer-header { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 40px; }
        .back-arrow-btn { background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; padding: 5px; }
        .side-menu-links { display: flex; flex-direction: column; }
        .side-menu-links a { font-size: 1.2rem; color: var(--text); text-decoration: none; margin: 0.8rem 0; font-weight: 500; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: color 0.2s; }
        .side-menu-links a:hover { color: var(--accent); }
        .side-menu-links a i { font-size: 1rem; color: var(--text-muted); width: 20px; }
        .side-menu-links a.ai-btn i { color: #a855f7; }

        /* --- CONTACT BLOCK --- */
        .contact-container { padding: 140px 8% 60px 8%; max-width: 1000px; margin: auto; text-align: center; }
        h2 { font-size: 2.5rem; color: var(--accent); margin-bottom: 40px; text-transform: uppercase; }
        
        .footer-container { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 40px; background: var(--card-bg); padding: 50px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .footer-column { flex: 1; min-width: 280px; }
        .footer-column h3 { color: #ffffff; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; font-weight: 600; }
        
        .support-card { display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50px; padding: 12px 25px; margin-bottom: 15px; text-decoration: none; transition: all 0.3s ease; max-width: 320px; width: 100%; }
        .support-card:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.03); }
        .support-card i { color: #ffffff; font-size: 1.2rem; margin-right: 15px; flex-shrink: 0; }
        .support-card .info { display: flex; flex-direction: column; min-width: 0; }
        .support-card .label { color: var(--text-muted); font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .support-card .value { color: var(--st-orange); font-weight: 700; font-size: 1.1rem; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .contact-text { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 15px; }
        .email-link { color: var(--st-orange); text-decoration: none; font-weight: 500; font-size: 0.95rem; }
        .email-link:hover { text-decoration: underline; }
        
        .social-icons { display: flex; gap: 15px; margin-top: 15px; }
        .social-icons a { width: 38px; height: 38px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #ffffff; text-decoration: none; transition: all 0.3s ease; font-size: 1rem; }
        .social-icons a:hover { background: var(--accent); color: var(--bg); transform: translateY(-3px); }

        /* --- MOBILE MEDIA QUERY FIXES --- */
        @media (max-width: 480px) {
            .contact-container { padding: 100px 4% 40px 4%; }
            h2 { font-size: 1.8rem; margin-bottom: 25px; }
            .footer-container { padding: 30px 20px; gap: 30px; }
            .footer-column { min-width: 100%; }
            .support-card { 
                padding: 12px 18px; 
                border-radius: 12px; /* Changes pill style to a smooth box layout on tiny screens */
            }
            .support-card i { margin-right: 12px; font-size: 1.1rem; }
            .support-card .value { font-size: 1rem; }
        }
    </style>
</head>
